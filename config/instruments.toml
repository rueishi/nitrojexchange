# NitroJEx instrument registry.
#
# Runtime use: ConfigManager.loadInstruments() reads this file at startup so
# registry and strategy wiring can agree on immutable instrument IDs. Decimal
# sizes are strings to avoid TOML floating-point conversion before Java fixed
# point parsing.

[[instrument]]
id            = 1
symbol        = "BTC-USD"
baseCurrency  = "BTC"
quoteCurrency = "USD"
tickSize      = "0.01"
lotSize       = "0.00001"
priceScale    = 100000000
qtyScale      = 100000000

[[instrument]]
id            = 2
symbol        = "ETH-USD"
baseCurrency  = "ETH"
quoteCurrency = "USD"
tickSize      = "0.01"
lotSize       = "0.0001"
priceScale    = 100000000
qtyScale      = 100000000
